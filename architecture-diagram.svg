<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="'Segoe UI', Roboto, -apple-system, sans-serif">
  <defs>
    <style>
      .box { fill: #f8fafc; stroke: #1e293b; stroke-width: 1.5; rx: 6; }
      .box-header { fill: #0f172a; }
      .header-text { fill: #ffffff; font-size: 13px; font-weight: 700; letter-spacing: 0.03em; }
      .body-text { fill: #334155; font-size: 11px; }
      .body-bold { fill: #1e293b; font-size: 11px; font-weight: 600; }
      .arrow-line { stroke: #0ea5e9; stroke-width: 2; fill: none; }
      .arrow-head { fill: #0ea5e9; }
      .arrow-label { fill: #0369a1; font-size: 10px; font-weight: 600; }
      .arrow-sublabel { fill: #64748b; font-size: 9px; }
      .actor-box { fill: #e0f2fe; stroke: #0ea5e9; stroke-width: 1.5; rx: 6; }
      .actor-text { fill: #0c4a6e; font-size: 12px; font-weight: 700; }
      .actor-sublabel { fill: #64748b; font-size: 9.5px; }
    </style>
  </defs>

  <!-- PALANTIR-CORE box -->
  <rect class="box" x="30" y="30" width="280" height="230"/>
  <rect class="box-header" x="30" y="30" width="280" height="32" rx="6"/>
  <rect class="box-header" x="30" y="50" width="280" height="12"/>
  <text class="header-text" x="170" y="52" text-anchor="middle">PALANTIR-CORE</text>

  <text class="body-bold" x="55" y="88">Spring Boot 3</text>
  <text class="body-text" x="55" y="106">Java 21 / Virtual Threads</text>
  <text class="body-text" x="55" y="132">Orekit 12.2</text>
  <text class="body-text" x="55" y="150">SGP4 / SDP4 propagation</text>
  <text class="body-bold" x="55" y="176">TEME → ITRF → WGS84</text>
  <text class="body-text" x="55" y="202">CCSDS 133.0-B-1 encoder</text>
  <text class="body-text" x="55" y="220">UDP telemetry sender</text>
  <text class="body-text" x="55" y="242">UDP telecommand receiver</text>

  <!-- YAMCS box -->
  <rect class="box" x="610" y="30" width="280" height="230"/>
  <rect class="box-header" x="610" y="30" width="280" height="32" rx="6"/>
  <rect class="box-header" x="610" y="50" width="280" height="12"/>
  <text class="header-text" x="750" y="52" text-anchor="middle">YAMCS  (upstream)</text>

  <text class="body-bold" x="635" y="88">Yamcs 5.12</text>
  <text class="body-text" x="635" y="106">UdpTmDataLink  :10000</text>
  <text class="body-text" x="635" y="132">XTCE MDB</text>
  <text class="body-text" x="635" y="150">Packet decoding + archive</text>
  <text class="body-bold" x="635" y="176">Web UI  :8090</text>
  <text class="body-text" x="635" y="202">UdpTcDataLink  → :10001</text>
  <text class="body-text" x="635" y="220">WebSocket live parameters</text>
  <text class="body-text" x="635" y="242">Command queues + verification</text>

  <!-- TM arrow (right) -->
  <line class="arrow-line" x1="310" y1="100" x2="600" y2="100"/>
  <polygon class="arrow-head" points="600,95 610,100 600,105"/>
  <text class="arrow-label" x="460" y="90" text-anchor="middle">CCSDS / UDP :10000</text>
  <text class="arrow-sublabel" x="460" y="118" text-anchor="middle">18-byte Space Packet  ·  APID 100  ·  1 Hz</text>

  <!-- TC arrow (left) -->
  <line class="arrow-line" x1="610" y1="200" x2="320" y2="200"/>
  <polygon class="arrow-head" points="320,195 310,200 320,205"/>
  <text class="arrow-label" x="460" y="190" text-anchor="middle">UDP :10001</text>
  <text class="arrow-sublabel" x="460" y="218" text-anchor="middle">Telecommand opcode</text>

  <!-- OPERATOR actor -->
  <rect class="actor-box" x="70" y="330" width="180" height="60"/>
  <text class="actor-text" x="160" y="358" text-anchor="middle">OPERATOR</text>
  <text class="actor-sublabel" x="160" y="376" text-anchor="middle">POST /api/orbit/tle  (hot-swap TLE)</text>

  <!-- OPERATOR arrow up -->
  <line class="arrow-line" x1="160" y1="330" x2="160" y2="268"/>
  <polygon class="arrow-head" points="155,268 160,258 165,268"/>

  <!-- BROWSER actor -->
  <rect class="actor-box" x="670" y="330" width="180" height="60"/>
  <text class="actor-text" x="760" y="358" text-anchor="middle">BROWSER</text>
  <text class="actor-sublabel" x="760" y="376" text-anchor="middle">WebSocket live parameters</text>

  <!-- BROWSER arrow down -->
  <line class="arrow-line" x1="760" y1="260" x2="760" y2="322"/>
  <polygon class="arrow-head" points="755,322 760,332 765,322"/>
</svg>

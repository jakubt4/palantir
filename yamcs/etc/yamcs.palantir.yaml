services:
  - class: org.yamcs.ProcessorCreatorService
    args:
      name: "realtime"
      type: "realtime"
  - class: org.yamcs.archive.XtceTmRecorder
  - class: org.yamcs.archive.ParameterRecorder
  - class: org.yamcs.archive.AlarmRecorder
  - class: org.yamcs.archive.CommandHistoryRecorder
  - class: org.yamcs.archive.ReplayServer

dataLinks:
  - name: udp-tm
    class: org.yamcs.tctm.UdpTmDataLink
    stream: tm_realtime
    port: 10000
    # CfsPacketPreprocessor reads the Secondary Header CUC time at byte 6
    # (4-byte uint32 coarse + 2-byte uint16 fine) and stamps each packet's
    # generation_time from it. Replaces useLocalGenerationTime=true which
    # used ground reception time as a stand-in for spacecraft time
    # (CLAUDE.md Rule 26).
    packetPreprocessorClassName: org.yamcs.tctm.cfs.CfsPacketPreprocessor
    packetPreprocessorArgs:
      errorDetection:
        type: NONE
      timeEncoding:
        epoch: TAI
  - name: udp-tc
    class: org.yamcs.tctm.UdpTcDataLink
    stream: tc_realtime
    host: palantir-core
    port: 10001

mdb:
  - type: xtce
    spec: mdb/baseline.xml
    subLoaders:
      - {type: xtce, spec: mdb/features/commands.xml}

streamConfig:
  tm:
    - name: "tm_realtime"
      processor: "realtime"
  tc:
    - name: "tc_realtime"
      processor: "realtime"
  cmdHist: ["cmdhist_realtime", "cmdhist_dump"]
  event: ["events_realtime"]
  param: ["pp_realtime", "sys_param", "proc_param"]
  parameterAlarm: ["alarms_realtime"]
  eventAlarm: ["event_alarms_realtime"]
